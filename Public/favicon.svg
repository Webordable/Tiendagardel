<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a1008"/>
  
  <!-- Chess pawn shape -->
  <!-- Head (circle) -->
  <circle cx="16" cy="9" r="4.5" fill="#f5ede0"/>
  
  <!-- Neck -->
  <rect x="14" y="13" width="4" height="2.5" rx="1" fill="#f5ede0"/>
  
